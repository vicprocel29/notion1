<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=320, initial-scale=1.0" />
  <title>Widgets personales</title>
  <style>
    :root{
      --bg:#171717;
      --card:#202020;
      --line:#2c2c2c;
      --text:#f5f5f5;
      --muted:#bdbdbd;
      --soft:#2a2a2a;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 320px;
      background: var(--bg);
      font-family: Arial, sans-serif;
      color: var(--text);
      overflow-x: hidden;
    }

    body {
      padding: 10px;
      box-sizing: border-box;
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      box-sizing: border-box;
      box-shadow: 0 2px 10px rgba(0,0,0,.18);
    }

    .top {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: var(--soft);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .info {
      flex: 1;
      min-width: 0;
    }

    .count {
      font-size: 26px;
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: .3px;
    }

    .label {
      font-size: 15px;
      color: var(--muted);
      margin-top: 4px;
    }

    .buttons {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    button {
      min-width: 42px;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #2a2a2a;
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
      padding: 0 10px;
    }

    button:hover {
      background: #313131;
    }

    .mini {
      font-size: 14px;
    }

    .timer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
    }

    .timer-value {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="stack">

    <!-- AGUA -->
    <div class="card">
      <div class="top">
        <div class="icon">💧</div>
        <div class="info">
          <div class="count"><span id="waterCount">0</span>/3000</div>
          <div class="label">Agua</div>
        </div>
      </div>
      <div class="buttons">
        <button onclick="changeWater(-50)">−</button>
        <button onclick="changeWater(50)">+</button>
        <button class="mini" onclick="resetWater()">Reset</button>
      </div>
    </div>

    <!-- GYM -->
    <div class="card">
      <div class="top">
        <div class="icon">🏋️</div>
        <div class="info">
          <div class="count"><span id="gymCount">0</span>/1</div>
          <div class="label">Ir al gym</div>
        </div>
      </div>
      <div class="buttons">
        <button onclick="setGym(0)">0</button>
        <button onclick="setGym(1)">1</button>
      </div>
    </div>

    <!-- COMIDA -->
    <div class="card">
      <div class="top">
        <div class="icon">🍽️</div>
        <div class="info">
          <div class="count">Comida</div>
          <div class="label">Temporizador de 25 min</div>
        </div>
      </div>

      <div class="timer">
        <div class="timer-value" id="mealTimer">25:00</div>
      </div>

      <div class="buttons">
        <button onclick="startMealTimer()">Start</button>
        <button onclick="pauseMealTimer()">Pause</button>
        <button class="mini" onclick="resetMealTimer()">Reset</button>
      </div>
    </div>

  </div>

  <script>
    // ------- AGUA -------
    const WATER_KEY = "widget_water_count_v2";
    let water = Number(localStorage.getItem(WATER_KEY));
    if (isNaN(water)) water = 0;

    function renderWater() {
      document.getElementById("waterCount").textContent = water;
      localStorage.setItem(WATER_KEY, water);
    }

    function changeWater(value) {
      water += value;
      if (water < 0) water = 0;
      if (water > 3000) water = 3000;
      renderWater();
    }

    function resetWater() {
      water = 0;
      renderWater();
    }

    // ------- GYM -------
    const GYM_KEY = "widget_gym_count_v2";
    let gym = Number(localStorage.getItem(GYM_KEY));
    if (isNaN(gym)) gym = 0;
    if (gym !== 0 && gym !== 1) gym = 0;

    function renderGym() {
      document.getElementById("gymCount").textContent = gym;
      localStorage.setItem(GYM_KEY, gym);
    }

    function setGym(value) {
      gym = value;
      renderGym();
    }

    // ------- TIMER COMIDA -------
    const MEAL_SECONDS_KEY = "widget_meal_seconds_v2";
    const MEAL_RUNNING_KEY = "widget_meal_running_v2";
    const MEAL_END_KEY = "widget_meal_end_v2";

    let mealSeconds = Number(localStorage.getItem(MEAL_SECONDS_KEY));
    if (isNaN(mealSeconds)) mealSeconds = 1500; // 25 min

    let mealRunning = localStorage.getItem(MEAL_RUNNING_KEY) === "true";
    let mealEnd = Number(localStorage.getItem(MEAL_END_KEY));
    let timerInterval = null;

    function formatTime(totalSeconds) {
      const min = Math.floor(totalSeconds / 60);
      const sec = totalSeconds % 60;
      return String(min).padStart(2, "0") + ":" + String(sec).padStart(2, "0");
    }

    function renderMeal() {
      document.getElementById("mealTimer").textContent = formatTime(mealSeconds);
      localStorage.setItem(MEAL_SECONDS_KEY, mealSeconds);
      localStorage.setItem(MEAL_RUNNING_KEY, mealRunning);
      if (mealRunning) {
        localStorage.setItem(MEAL_END_KEY, mealEnd);
      }
    }

    function tickMeal() {
      if (!mealRunning) return;

      const now = Date.now();
      const remaining = Math.max(0, Math.ceil((mealEnd - now) / 1000));
      mealSeconds = remaining;
      renderMeal();

      if (remaining <= 0) {
        mealRunning = false;
        clearInterval(timerInterval);
        timerInterval = null;
        renderMeal();
      }
    }

    function startMealTimer() {
      if (mealRunning) return;
      mealRunning = true;
      mealEnd = Date.now() + mealSeconds * 1000;
      renderMeal();

      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(tickMeal, 500);
    }

    function pauseMealTimer() {
      if (!mealRunning) return;
      tickMeal();
      mealRunning = false;
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
      renderMeal();
    }

    function resetMealTimer() {
      mealRunning = false;
      mealSeconds = 1500;
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
      localStorage.removeItem(MEAL_END_KEY);
      renderMeal();
    }

    function restoreMealTimer() {
      if (mealRunning) {
        const savedEnd = Number(localStorage.getItem(MEAL_END_KEY));
        if (!isNaN(savedEnd) && savedEnd > Date.now()) {
          mealEnd = savedEnd;
          tickMeal();
          timerInterval = setInterval(tickMeal, 500);
        } else {
          mealRunning = false;
          mealSeconds = 0;
          renderMeal();
        }
      } else {
        renderMeal();
      }
    }

    renderWater();
    renderGym();
    restoreMealTimer();
  </script>
</body>
</html>
