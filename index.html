<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Water Counter</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .widget {
      width: 260px;
      padding: 14px;
      border-radius: 16px;
      background: rgba(26, 31, 41, 0.88);
      color: #ffffff;
      border: 1.5px solid rgba(255,255,255,0.10);
      box-shadow: 0 6px 18px rgba(0,0,0,0.28);
      box-sizing: border-box;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .top {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .info {
      flex: 1;
    }

    .count {
      font-size: 28px;
      font-weight: bold;
      line-height: 1;
    }

    .label {
      font-size: 18px;
      margin-top: 4px;
      color: #d7dbe3;
    }

    .buttons {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      justify-content: flex-end;
    }

    button {
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 10px;
      font-size: 24px;
      cursor: pointer;
      background: rgba(255,255,255,0.12);
      color: white;
    }

    button:hover {
      background: rgba(255,255,255,0.18);
    }
  </style>
</head>
<body>
  <div class="widget">
    <div class="top">
      <div class="icon">💧</div>
      <div class="info">
        <div class="count"><span id="count">0</span>/3000</div>
        <div class="label">Water</div>
      </div>
    </div>

    <div class="buttons">
      <button onclick="change(-50)">−</button>
      <button onclick="change(50)">+</button>
    </div>
  </div>

  <script>
    let count = 0;

    function change(value) {
      count += value;
      if (count < 0) count = 0;
      if (count > 3000) count = 3000;
      document.getElementById("count").textContent = count;
    }
  </script>
</body>
</html>
